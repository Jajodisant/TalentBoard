<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Candidate Dashboard – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <!-- Page header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-person-badge me-2" style="color:#6366f1;"></i>Candidate Dashboard
            </h4>
            <p class="text-muted small mb-0">Track your applications and discover opportunities</p>
        </div>
        <a th:href="@{/vacancies}" class="btn btn-sm text-white" style="background:#6366f1;">
            <i class="bi bi-search me-1"></i>Browse Vacancies
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Stat card -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-3 p-3" style="background:#ede9fe;">
                        <i class="bi bi-file-earmark-text-fill fs-4" style="color:#6366f1;"></i>
                    </div>
                    <div>
                        <div class="fs-4 fw-bold" th:text="${myApplications.totalElements}">0</div>
                        <div class="text-muted small">My Applications</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-3 p-3" style="background:#dcfce7;">
                        <i class="bi bi-briefcase-fill fs-4 text-success"></i>
                    </div>
                    <div>
                        <div class="fs-4 fw-bold" th:text="${openVacancies.totalElements}">0</div>
                        <div class="text-muted small">Open Vacancies</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <!-- My Applications -->
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
                    <h6 class="fw-semibold mb-0">
                        <i class="bi bi-file-earmark-text me-2" style="color:#6366f1;"></i>My Applications
                    </h6>
                    <a th:href="@{/applications}" class="btn btn-sm btn-outline-secondary">View All</a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-3">Vacancy</th>
                                <th>Status</th>
                                <th>Applied</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${myApplications.isEmpty()}">
                                <td colspan="3" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox d-block fs-3 mb-2"></i>No applications yet.
                                </td>
                            </tr>
                            <tr th:each="a : ${myApplications}">
                                <td class="ps-3">
                                    <a th:href="@{/applications/{id}(id=${a.idApplication})}"
                                       class="text-decoration-none fw-medium" th:text="${a.vacancyTitle}"></a>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${a.status.name() == 'APPLIED' ? 'bg-primary' :
                                                          a.status.name() == 'IN_REVIEW' ? 'bg-warning text-dark' :
                                                          a.status.name() == 'INTERVIEWED' ? 'bg-info text-dark' :
                                                          a.status.name() == 'HIRED' ? 'bg-success' : 'bg-danger'}"
                                          th:text="${a.status}"></span>
                                </td>
                                <td class="text-muted small"
                                    th:text="${#temporals.format(a.applicationDate, 'dd MMM yyyy')}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Open Vacancies -->
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
                    <h6 class="fw-semibold mb-0">
                        <i class="bi bi-briefcase me-2" style="color:#6366f1;"></i>Open Vacancies
                    </h6>
                    <a th:href="@{/vacancies}" class="btn btn-sm btn-outline-secondary">Browse All</a>
                </div>
                <div class="card-body p-0">
                    <div class="list-group list-group-flush">
                        <div th:if="${openVacancies.isEmpty()}"
                             class="list-group-item text-center text-muted py-4">
                            No open vacancies right now.
                        </div>
                        <a th:each="v : ${openVacancies}"
                           th:href="@{/vacancies/{id}(id=${v.idVacancy})}"
                           class="list-group-item list-group-item-action px-3 py-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="fw-medium" th:text="${v.title}"></div>
                                    <div class="text-muted small">
                                        <span th:text="${v.category}"></span>
                                        <span th:if="${v.workMode}"> · <span th:text="${v.workMode}"></span></span>
                                    </div>
                                </div>
                                <span class="badge bg-success ms-2">OPEN</span>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
