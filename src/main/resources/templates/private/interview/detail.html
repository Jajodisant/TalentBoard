<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Interview Detail – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width:700px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/interviews}" class="text-decoration-none">Interviews</a></li>
            <li class="breadcrumb-item active" th:text="'#' + ${interview.idInterview}"></li>
        </ol>
    </nav>

    <!-- Flash -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3 px-4">
            <h5 class="fw-bold mb-0">
                <i class="bi bi-calendar-event me-2" style="color:#6366f1;"></i>Interview Details
            </h5>
        </div>
        <div class="card-body p-4">
            <dl class="row mb-0">
                <dt class="col-sm-4 text-muted fw-normal">Date</dt>
                <dd class="col-sm-8 fw-medium"
                    th:text="${#temporals.format(interview.interviewDate, 'EEEE, dd MMMM yyyy')}"></dd>

                <dt class="col-sm-4 text-muted fw-normal">Time</dt>
                <dd class="col-sm-8 fw-medium" th:text="${interview.interviewTime}"></dd>

                <dt class="col-sm-4 text-muted fw-normal" th:if="${interview.type}">Type</dt>
                <dd class="col-sm-8" th:if="${interview.type}" th:text="${interview.type}"></dd>

                <dt class="col-sm-4 text-muted fw-normal">Responsible</dt>
                <dd class="col-sm-8" th:text="${interview.responsibleName}"></dd>

                <dt class="col-sm-4 text-muted fw-normal">Application</dt>
                <dd class="col-sm-8">
                    <a th:href="@{/applications/{id}(id=${interview.applicationId})}"
                       class="text-decoration-none">
                        Application #<span th:text="${interview.applicationId}"></span>
                    </a>
                </dd>

                <dt class="col-sm-4 text-muted fw-normal" th:if="${interview.result}">Result</dt>
                <dd class="col-sm-8" th:if="${interview.result}">
                    <span class="badge bg-secondary" th:text="${interview.result}"></span>
                </dd>

                <dt class="col-sm-4 text-muted fw-normal" th:if="${interview.observations}">Observations</dt>
                <dd class="col-sm-8" th:if="${interview.observations}"
                    style="white-space:pre-line;" th:text="${interview.observations}"></dd>
            </dl>
        </div>

        <div class="card-footer bg-white px-4 py-3 d-flex justify-content-between align-items-center">
            <a th:href="@{/interviews}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <form th:action="@{/interviews/delete/{id}(id=${interview.idInterview})}"
                  method="post"
                  onsubmit="return confirm('Delete this interview? This cannot be undone.')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash me-1"></i>Delete Interview
                </button>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
