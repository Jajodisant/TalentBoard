<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Schedule Interview – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width:680px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/interviews}" class="text-decoration-none">Interviews</a></li>
            <li class="breadcrumb-item active">Schedule</li>
        </ol>
    </nav>

    <!-- Application context -->
    <div th:if="${application != null}" class="card border-0 shadow-sm mb-4">
        <div class="card-body py-2 px-3">
            <small class="text-muted">
                Scheduling interview for
                <a th:href="@{/applications/{id}(id=${application.idApplication})}"
                   class="text-decoration-none fw-medium">
                    Application #<span th:text="${application.idApplication}"></span>
                </a>
                — <span th:text="${application.vacancyTitle}"></span>
                (candidate: <span th:text="${application.userName}"></span>)
            </small>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom py-3 px-4">
            <h5 class="fw-bold mb-0">
                <i class="bi bi-calendar-plus me-2" style="color:#6366f1;"></i>Schedule Interview
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/interviews/schedule}"
                  th:object="${interviewForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Hidden: applicationId (pre-filled when coming from application detail) -->
                <div class="mb-3" th:if="${application == null}">
                    <label for="applicationId" class="form-label fw-medium">
                        Application ID <span class="text-danger">*</span>
                    </label>
                    <input type="number" id="applicationId" th:field="*{applicationId}"
                           class="form-control" th:classappend="${#fields.hasErrors('applicationId') ? ' is-invalid' : ''}"
                           placeholder="Enter the application ID" min="1" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('applicationId')}"
                         th:errors="*{applicationId}"></div>
                </div>
                <input type="hidden" th:if="${application != null}" th:field="*{applicationId}"/>

                <!-- Responsible ID: auto-filled from current user -->
                <input type="hidden" th:field="*{responsibleId}"
                       th:value="${currentUser != null ? currentUser.idUser : null}"/>

                <div class="row g-3">
                    <!-- Date -->
                    <div class="col-sm-6">
                        <label for="interviewDate" class="form-label fw-medium">
                            Date <span class="text-danger">*</span>
                        </label>
                        <input type="date" id="interviewDate" th:field="*{interviewDate}"
                               class="form-control" th:classappend="${#fields.hasErrors('interviewDate') ? ' is-invalid' : ''}"
                               required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('interviewDate')}"
                             th:errors="*{interviewDate}"></div>
                    </div>

                    <!-- Time -->
                    <div class="col-sm-6">
                        <label for="interviewTime" class="form-label fw-medium">
                            Time <span class="text-danger">*</span>
                        </label>
                        <input type="time" id="interviewTime" th:field="*{interviewTime}"
                               class="form-control" th:classappend="${#fields.hasErrors('interviewTime') ? ' is-invalid' : ''}"
                               required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('interviewTime')}"
                             th:errors="*{interviewTime}"></div>
                    </div>

                    <!-- Type -->
                    <div class="col-12">
                        <label for="type" class="form-label fw-medium">Interview Type</label>
                        <input type="text" id="type" th:field="*{type}"
                               class="form-control"
                               placeholder="e.g. Phone Screen, Technical, HR, On-site"/>
                    </div>

                    <!-- Observations -->
                    <div class="col-12">
                        <label for="observations" class="form-label fw-medium">Observations</label>
                        <textarea id="observations" th:field="*{observations}" rows="3"
                                  class="form-control"
                                  placeholder="Notes, preparation instructions, meeting link..."></textarea>
                    </div>
                </div>

                <hr class="my-4"/>
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="${application != null}
                           ? @{/applications/{id}(id=${application.idApplication})}
                           : @{/interviews}"
                       class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn text-white" style="background:#6366f1;">
                        <i class="bi bi-calendar-check me-1"></i>Schedule Interview
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
