<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Interviews – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-calendar-check me-2" style="color:#6366f1;"></i>
                <span th:if="${application != null}">Interviews for Application
                    <span class="text-primary" th:text="'#' + ${application.idApplication}"></span>
                </span>
                <span th:if="${application == null}">My Interviews</span>
            </h4>
            <p class="text-muted small mb-0"
               th:text="${interviews.totalElements} + ' interview(s) scheduled'"></p>
        </div>
        <a th:href="${application != null} ? @{/interviews/schedule(applicationId=${application.idApplication})} : @{/interviews/schedule}"
           class="btn btn-sm text-white" style="background:#6366f1;">
            <i class="bi bi-plus-circle me-1"></i>Schedule Interview
        </a>
    </div>

    <!-- Flash -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Type</th>
                        <th>Responsible</th>
                        <th>Result</th>
                        <th class="text-end pe-3">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${interviews.isEmpty()}">
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-calendar-x fs-1 d-block mb-3"></i>No interviews scheduled yet.
                        </td>
                    </tr>
                    <tr th:each="i : ${interviews}">
                        <td class="ps-3 text-muted small" th:text="${i.idInterview}"></td>
                        <td class="fw-medium" th:text="${#temporals.format(i.interviewDate, 'dd MMM yyyy')}"></td>
                        <td th:text="${i.interviewTime}"></td>
                        <td class="text-muted small" th:text="${i.type}"></td>
                        <td class="text-muted small" th:text="${i.responsibleName}"></td>
                        <td>
                            <span th:if="${i.result}" class="badge bg-secondary" th:text="${i.result}"></span>
                            <span th:if="${i.result == null}" class="text-muted small">—</span>
                        </td>
                        <td class="text-end pe-3">
                            <a th:href="@{/interviews/{id}(id=${i.idInterview})}"
                               class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div th:if="${interviews.totalPages > 1}" class="d-flex justify-content-center py-3">
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${interviews.first ? 'disabled' : ''}">
                            <a class="page-link"
                               th:href="${application != null}
                                   ? @{/interviews/application/{id}(id=${application.idApplication},page=${interviews.number - 1})}
                                   : @{/interviews(page=${interviews.number - 1})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>
                        <li class="page-item active">
                            <span class="page-link"
                                  th:text="${interviews.number + 1} + ' / ' + ${interviews.totalPages}"></span>
                        </li>
                        <li class="page-item" th:classappend="${interviews.last ? 'disabled' : ''}">
                            <a class="page-link"
                               th:href="${application != null}
                                   ? @{/interviews/application/{id}(id=${application.idApplication},page=${interviews.number + 1})}
                                   : @{/interviews(page=${interviews.number + 1})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
