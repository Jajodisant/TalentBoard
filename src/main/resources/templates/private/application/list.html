<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Applications – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-file-earmark-text me-2" style="color:#6366f1;"></i>
                <span th:if="${vacancy != null}">Applications for
                    <span class="text-primary" th:text="${vacancy.title}"></span>
                </span>
                <span th:if="${vacancy == null}">My Applications</span>
            </h4>
            <p class="text-muted small mb-0"
               th:text="${applications.totalElements} + ' application(s) found'"></p>
        </div>
        <a th:href="@{/vacancies}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back to Vacancies
        </a>
    </div>

    <!-- Flash -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">#</th>
                        <th th:if="${vacancy == null}">Vacancy</th>
                        <th sec:authorize="hasAnyRole('ADMIN','RECRUITER')">Candidate</th>
                        <th>Status</th>
                        <th>Applied On</th>
                        <th class="text-end pe-3">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${applications.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-3"></i>No applications found.
                        </td>
                    </tr>
                    <tr th:each="a : ${applications}">
                        <td class="ps-3 text-muted small" th:text="${a.idApplication}"></td>
                        <td th:if="${vacancy == null}">
                            <a th:href="@{/vacancies/{id}(id=${a.vacancyId})}"
                               class="text-decoration-none fw-medium" th:text="${a.vacancyTitle}"></a>
                        </td>
                        <td sec:authorize="hasAnyRole('ADMIN','RECRUITER')" th:text="${a.userName}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${a.status.name() == 'APPLIED' ? 'bg-primary' :
                                                  a.status.name() == 'IN_REVIEW' ? 'bg-warning text-dark' :
                                                  a.status.name() == 'INTERVIEWED' ? 'bg-info text-dark' :
                                                  a.status.name() == 'HIRED' ? 'bg-success' : 'bg-danger'}"
                                  th:text="${a.status}"></span>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(a.applicationDate, 'dd MMM yyyy HH:mm')}"></td>
                        <td class="text-end pe-3">
                            <a th:href="@{/applications/{id}(id=${a.idApplication})}"
                               class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div th:if="${applications.totalPages > 1}" class="d-flex justify-content-center py-3">
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${applications.first ? 'disabled' : ''}">
                            <a class="page-link"
                               th:href="${vacancy != null} ? @{/applications/vacancy/{id}(id=${vacancy.idVacancy},page=${applications.number - 1})} : @{/applications(page=${applications.number - 1})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>
                        <li class="page-item active">
                            <span class="page-link"
                                  th:text="${applications.number + 1} + ' / ' + ${applications.totalPages}"></span>
                        </li>
                        <li class="page-item" th:classappend="${applications.last ? 'disabled' : ''}">
                            <a class="page-link"
                               th:href="${vacancy != null} ? @{/applications/vacancy/{id}(id=${vacancy.idVacancy},page=${applications.number + 1})} : @{/applications(page=${applications.number + 1})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
