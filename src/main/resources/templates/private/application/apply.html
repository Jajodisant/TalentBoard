<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Apply – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width:680px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/vacancies}" class="text-decoration-none">Vacancies</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/vacancies/{id}(id=${vacancy.idVacancy})}"
                   class="text-decoration-none" th:text="${vacancy.title}"></a>
            </li>
            <li class="breadcrumb-item active">Apply</li>
        </ol>
    </nav>

    <!-- Vacancy summary -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h5 class="fw-bold mb-1" th:text="${vacancy.title}"></h5>
                    <p class="text-muted small mb-0">
                        <span th:if="${vacancy.category}" th:text="${vacancy.category}"></span>
                        <span th:if="${vacancy.workMode}"> · <span th:text="${vacancy.workMode}"></span></span>
                        <span th:if="${vacancy.salary}"> · $<span th:text="${#numbers.formatDecimal(vacancy.salary, 1, 'COMMA', 0, 'POINT')}"></span></span>
                    </p>
                </div>
                <span class="badge bg-success">OPEN</span>
            </div>
        </div>
    </div>

    <!-- Application form -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom py-3 px-4">
            <h5 class="fw-bold mb-0">
                <i class="bi bi-send me-2" style="color:#6366f1;"></i>Submit Your Application
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/applications/apply}"
                  th:object="${applicationForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{vacancyId}"/>

                <div class="mb-4">
                    <label for="observations" class="form-label fw-medium">Cover Note (optional)</label>
                    <textarea id="observations" th:field="*{observations}" rows="5"
                              class="form-control"
                              placeholder="Tell the recruiter why you're a great fit for this position..."></textarea>
                    <div class="form-text">Max 2000 characters. This message will be visible to the recruiter.</div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/vacancies/{id}(id=${vacancy.idVacancy})}"
                       class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn text-white" style="background:#6366f1;">
                        <i class="bi bi-send me-1"></i>Submit Application
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
