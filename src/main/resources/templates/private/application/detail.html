<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Application Detail – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width:760px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/applications}" class="text-decoration-none">Applications</a></li>
            <li class="breadcrumb-item active" th:text="'#' + ${application.idApplication}"></li>
        </ol>
    </nav>

    <!-- Flash -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Detail card -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white py-3 px-4">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0">
                    <i class="bi bi-file-earmark-text me-2" style="color:#6366f1;"></i>Application Details
                </h5>
                <span class="badge fs-6"
                      th:classappend="${application.status.name() == 'APPLIED' ? 'bg-primary' :
                                      application.status.name() == 'IN_REVIEW' ? 'bg-warning text-dark' :
                                      application.status.name() == 'INTERVIEWED' ? 'bg-info text-dark' :
                                      application.status.name() == 'HIRED' ? 'bg-success' : 'bg-danger'}"
                      th:text="${application.status}"></span>
            </div>
        </div>
        <div class="card-body p-4">
            <dl class="row mb-0">
                <dt class="col-sm-4 text-muted fw-normal">Vacancy</dt>
                <dd class="col-sm-8">
                    <a th:href="@{/vacancies/{id}(id=${application.vacancyId})}"
                       class="text-decoration-none fw-medium" th:text="${application.vacancyTitle}"></a>
                </dd>

                <dt class="col-sm-4 text-muted fw-normal">Candidate</dt>
                <dd class="col-sm-8 fw-medium" th:text="${application.userName}"></dd>

                <dt class="col-sm-4 text-muted fw-normal">Applied On</dt>
                <dd class="col-sm-8"
                    th:text="${#temporals.format(application.applicationDate, 'dd MMMM yyyy, HH:mm')}"></dd>

                <dt class="col-sm-4 text-muted fw-normal" th:if="${application.observations}">Observations</dt>
                <dd class="col-sm-8" th:if="${application.observations}"
                    style="white-space:pre-line;" th:text="${application.observations}"></dd>
            </dl>
        </div>

        <!-- Interviews link -->
        <div class="card-footer bg-white px-4 py-3 d-flex justify-content-between align-items-center">
            <a th:href="@{/applications}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <div class="d-flex gap-2">
                <a th:href="@{/interviews/application/{id}(id=${application.idApplication})}"
                   sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
                   class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-calendar-check me-1"></i>Interviews
                </a>
                <a th:href="@{/interviews/schedule(applicationId=${application.idApplication})}"
                   sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
                   class="btn btn-sm text-white" style="background:#6366f1;">
                    <i class="bi bi-plus-circle me-1"></i>Schedule Interview
                </a>
            </div>
        </div>
    </div>

    <!-- Update status (recruiter / admin only) -->
    <div class="card border-0 shadow-sm" sec:authorize="hasAnyRole('ADMIN','RECRUITER')">
        <div class="card-header bg-white py-3 px-4">
            <h6 class="fw-semibold mb-0">
                <i class="bi bi-arrow-repeat me-2" style="color:#6366f1;"></i>Update Status
            </h6>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/applications/{id}/status(id=${application.idApplication})}"
                  method="post" class="d-flex gap-3 align-items-end">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="flex-grow-1">
                    <label for="status" class="form-label fw-medium">New Status</label>
                    <select id="status" name="status" class="form-select" required>
                        <option value="">Select new status...</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s}"
                                th:selected="${s == application.status}"></option>
                    </select>
                </div>
                <button type="submit" class="btn text-white" style="background:#6366f1;">
                    <i class="bi bi-check-lg me-1"></i>Update
                </button>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
