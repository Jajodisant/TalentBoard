<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Recruiter Dashboard – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <!-- Page header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-person-workspace me-2" style="color:#6366f1;"></i>Recruiter Dashboard
            </h4>
            <p class="text-muted small mb-0">Manage your job vacancies</p>
        </div>
        <a th:href="@{/vacancies/create}" class="btn btn-sm text-white"
           style="background:#6366f1;">
            <i class="bi bi-plus-circle me-1"></i>Post New Vacancy
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Stat card -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-3 p-3" style="background:#ede9fe;">
                        <i class="bi bi-briefcase-fill fs-4" style="color:#6366f1;"></i>
                    </div>
                    <div>
                        <div class="fs-4 fw-bold" th:text="${myVacancies.totalElements}">0</div>
                        <div class="text-muted small">My Vacancies</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Vacancies table -->
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom-0 pt-3 pb-0">
            <h6 class="fw-semibold mb-0">
                <i class="bi bi-list-ul me-2" style="color:#6366f1;"></i>My Vacancies
            </h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">Title</th>
                        <th>Category</th>
                        <th>Work Mode</th>
                        <th>Status</th>
                        <th>Posted</th>
                        <th class="text-end pe-3">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${myVacancies.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            No vacancies yet. <a th:href="@{/vacancies/create}">Post one now!</a>
                        </td>
                    </tr>
                    <tr th:each="v : ${myVacancies}">
                        <td class="ps-3">
                            <a th:href="@{/vacancies/{id}(id=${v.idVacancy})}"
                               class="text-decoration-none fw-medium" th:text="${v.title}"></a>
                        </td>
                        <td class="text-muted small" th:text="${v.category}"></td>
                        <td class="text-muted small" th:text="${v.workMode}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${v.status.name() == 'OPEN' ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${v.status}"></span>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(v.publicationDate, 'dd MMM yyyy')}"></td>
                        <td class="text-end pe-3">
                            <a th:href="@{/vacancies/edit/{id}(id=${v.idVacancy})}"
                               class="btn btn-sm btn-outline-secondary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/applications/vacancy/{id}(id=${v.idVacancy})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-people"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div th:if="${myVacancies.totalPages > 1}" class="d-flex justify-content-center py-3">
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${myVacancies.first ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/dashboard(page=${myVacancies.number - 1})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>
                        <li class="page-item active">
                            <span class="page-link"
                                  th:text="${myVacancies.number + 1} + ' / ' + ${myVacancies.totalPages}"></span>
                        </li>
                        <li class="page-item" th:classappend="${myVacancies.last ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/dashboard(page=${myVacancies.number + 1})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
