<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title th:text="${vacancy.title} + ' – TalentBoard'">Vacancy – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width:860px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/vacancies}" class="text-decoration-none">Vacancies</a></li>
            <li class="breadcrumb-item active" th:text="${vacancy.title}"></li>
        </ol>
    </nav>

    <!-- Flash -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Detail card -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

            <!-- Title + status -->
            <div class="d-flex justify-content-between align-items-start mb-3">
                <h4 class="fw-bold mb-0" th:text="${vacancy.title}"></h4>
                <span class="badge fs-6"
                      th:classappend="${vacancy.status.name() == 'OPEN' ? 'bg-success' : 'bg-secondary'}"
                      th:text="${vacancy.status}"></span>
            </div>

            <!-- Meta row -->
            <div class="row g-2 mb-4 text-muted small">
                <div class="col-auto" th:if="${vacancy.category}">
                    <i class="bi bi-tag me-1"></i><span th:text="${vacancy.category}"></span>
                </div>
                <div class="col-auto" th:if="${vacancy.workMode}">
                    <i class="bi bi-laptop me-1"></i><span th:text="${vacancy.workMode}"></span>
                </div>
                <div class="col-auto" th:if="${vacancy.salary}">
                    <i class="bi bi-cash-coin me-1 text-success"></i>
                    <span th:text="'$' + ${#numbers.formatDecimal(vacancy.salary, 1, 'COMMA', 0, 'POINT')}"></span>
                </div>
                <div class="col-auto">
                    <i class="bi bi-person-circle me-1"></i><span th:text="${vacancy.responsibleName}"></span>
                </div>
                <div class="col-auto">
                    <i class="bi bi-calendar3 me-1"></i>
                    <span th:text="${#temporals.format(vacancy.publicationDate, 'dd MMM yyyy')}"></span>
                </div>
            </div>

            <!-- Description -->
            <h6 class="fw-semibold text-uppercase text-muted small mb-2 letter-spacing">Description</h6>
            <p class="text-secondary" style="white-space:pre-line;" th:text="${vacancy.description}"></p>

        </div>

        <!-- Actions footer -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3 px-4">
            <a th:href="@{/vacancies}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <div class="d-flex gap-2">
                <!-- Candidate: apply -->
                <a th:href="@{/applications/apply/{id}(id=${vacancy.idVacancy})}"
                   sec:authorize="hasRole('CANDIDATE')"
                   th:if="${vacancy.status.name() == 'OPEN'}"
                   class="btn btn-sm text-white" style="background:#6366f1;">
                    <i class="bi bi-send me-1"></i>Apply Now
                </a>
                <!-- Recruiter/Admin: edit & delete -->
                <a th:href="@{/vacancies/edit/{id}(id=${vacancy.idVacancy})}"
                   sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
                   class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-pencil me-1"></i>Edit
                </a>
                <form th:action="@{/vacancies/delete/{id}(id=${vacancy.idVacancy})}"
                      method="post"
                      sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
                      onsubmit="return confirm('Delete this vacancy?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash me-1"></i>Delete
                    </button>
                </form>
                <!-- View applications -->
                <a th:href="@{/applications/vacancy/{id}(id=${vacancy.idVacancy})}"
                   sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
                   class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-people me-1"></i>Applications
                </a>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
