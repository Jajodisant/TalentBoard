<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title th:text="${vacancyId != null ? 'Edit Vacancy' : 'Post Vacancy'} + ' – TalentBoard'">Vacancy Form – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width:700px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/vacancies}" class="text-decoration-none">Vacancies</a></li>
            <li class="breadcrumb-item active"
                th:text="${vacancyId != null ? 'Edit Vacancy' : 'Post New Vacancy'}"></li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom py-3 px-4">
            <h5 class="fw-bold mb-0">
                <i class="bi bi-briefcase-fill me-2" style="color:#6366f1;"></i>
                <span th:text="${vacancyId != null ? 'Edit Vacancy' : 'Post New Vacancy'}"></span>
            </h5>
        </div>
        <div class="card-body p-4">

            <!-- POST to create or edit depending on vacancyId -->
            <form th:if="${vacancyId == null}"
                  th:action="@{/vacancies/create}"
                  th:object="${vacancyForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Title -->
                <div class="mb-3">
                    <label for="title" class="form-label fw-medium">Job Title <span class="text-danger">*</span></label>
                    <input type="text" id="title" th:field="*{title}"
                           class="form-control" th:classappend="${#fields.hasErrors('title') ? ' is-invalid' : ''}"
                           placeholder="e.g. Senior Java Developer" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label for="description" class="form-label fw-medium">Description <span class="text-danger">*</span></label>
                    <textarea id="description" th:field="*{description}" rows="5"
                              class="form-control" th:classappend="${#fields.hasErrors('description') ? ' is-invalid' : ''}"
                              placeholder="Describe responsibilities, requirements, benefits..."></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="row g-3">
                    <!-- Category -->
                    <div class="col-sm-6">
                        <label for="category" class="form-label fw-medium">Category</label>
                        <input type="text" id="category" th:field="*{category}"
                               class="form-control" placeholder="e.g. Engineering"/>
                    </div>

                    <!-- Work Mode -->
                    <div class="col-sm-6">
                        <label for="workMode" class="form-label fw-medium">Work Mode</label>
                        <input type="text" id="workMode" th:field="*{workMode}"
                               class="form-control" placeholder="e.g. Remote, On-site, Hybrid"/>
                    </div>

                    <!-- Salary -->
                    <div class="col-sm-6">
                        <label for="salary" class="form-label fw-medium">Salary (optional)</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" id="salary" th:field="*{salary}"
                                   class="form-control" placeholder="0.00" step="0.01" min="0"/>
                        </div>
                    </div>

                    <!-- Status -->
                    <div class="col-sm-6">
                        <label for="status" class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select id="status" th:field="*{status}"
                                class="form-select" th:classappend="${#fields.hasErrors('status') ? ' is-invalid' : ''}" required>
                            <option value="">Select status...</option>
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                    </div>
                </div>

                <hr class="my-4"/>
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/vacancies}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn text-white" style="background:#6366f1;">
                        <i class="bi bi-check-lg me-1"></i>Post Vacancy
                    </button>
                </div>
            </form>

            <!-- Edit form (vacancyId is set) -->
            <form th:if="${vacancyId != null}"
                  th:action="@{/vacancies/edit/{id}(id=${vacancyId})}"
                  th:object="${vacancyForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label for="titleE" class="form-label fw-medium">Job Title <span class="text-danger">*</span></label>
                    <input type="text" id="titleE" th:field="*{title}"
                           class="form-control" th:classappend="${#fields.hasErrors('title') ? ' is-invalid' : ''}"
                           required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label for="descriptionE" class="form-label fw-medium">Description <span class="text-danger">*</span></label>
                    <textarea id="descriptionE" th:field="*{description}" rows="5"
                              class="form-control" th:classappend="${#fields.hasErrors('description') ? ' is-invalid' : ''}"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="row g-3">
                    <div class="col-sm-6">
                        <label for="categoryE" class="form-label fw-medium">Category</label>
                        <input type="text" id="categoryE" th:field="*{category}" class="form-control"/>
                    </div>
                    <div class="col-sm-6">
                        <label for="workModeE" class="form-label fw-medium">Work Mode</label>
                        <input type="text" id="workModeE" th:field="*{workMode}" class="form-control"/>
                    </div>
                    <div class="col-sm-6">
                        <label for="salaryE" class="form-label fw-medium">Salary (optional)</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" id="salaryE" th:field="*{salary}"
                                   class="form-control" step="0.01" min="0"/>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <label for="statusE" class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select id="statusE" th:field="*{status}"
                                class="form-select" th:classappend="${#fields.hasErrors('status') ? ' is-invalid' : ''}" required>
                            <option value="">Select status...</option>
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                    </div>
                </div>

                <hr class="my-4"/>
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/vacancies/{id}(id=${vacancyId})}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn text-white" style="background:#6366f1;">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
