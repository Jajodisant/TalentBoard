<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:replace="~{fragments/head :: headLinks}"></th:block>
    <title>Vacancies – TalentBoard</title>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="bi bi-briefcase me-2" style="color:#6366f1;"></i>Open Vacancies
            </h4>
            <p class="text-muted small mb-0" th:text="${vacancies.totalElements} + ' positions available'"></p>
        </div>
        <a th:href="@{/vacancies/create}" sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
           class="btn btn-sm text-white" style="background:#6366f1;">
            <i class="bi bi-plus-circle me-1"></i>Post Vacancy
        </a>
    </div>

    <!-- Flash -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Cards grid -->
    <div class="row g-3">
        <div th:if="${vacancies.isEmpty()}" class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center py-5 text-muted">
                    <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                    <p class="mb-0">No open vacancies at the moment.</p>
                </div>
            </div>
        </div>

        <div th:each="v : ${vacancies}" class="col-md-6 col-xl-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="card-title fw-semibold mb-0" th:text="${v.title}"></h6>
                        <span class="badge ms-2"
                              th:classappend="${v.status.name() == 'OPEN' ? 'bg-success' : 'bg-secondary'}"
                              th:text="${v.status}"></span>
                    </div>
                    <p class="text-muted small mb-2">
                        <i class="bi bi-tag me-1"></i><span th:text="${v.category}"></span>
                        <span th:if="${v.workMode}"> &nbsp;·&nbsp; <i class="bi bi-laptop me-1"></i><span th:text="${v.workMode}"></span></span>
                    </p>
                    <p class="text-muted small mb-3" th:if="${v.salary}">
                        <i class="bi bi-cash-coin me-1 text-success"></i>
                        <span th:text="'$' + ${#numbers.formatDecimal(v.salary, 1, 'COMMA', 0, 'POINT')}"></span>
                    </p>
                    <p class="card-text text-muted small"
                       th:text="${#strings.abbreviate(v.description, 120)}"></p>
                </div>
                <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center pt-0 pb-3 px-3">
                    <small class="text-muted">
                        <i class="bi bi-person-circle me-1"></i><span th:text="${v.responsibleName}"></span>
                    </small>
                    <div class="d-flex gap-2">
                        <a th:href="@{/vacancies/{id}(id=${v.idVacancy})}"
                           class="btn btn-sm btn-outline-secondary">View</a>
                        <a th:href="@{/applications/apply/{id}(id=${v.idVacancy})}"
                           sec:authorize="hasRole('CANDIDATE')"
                           class="btn btn-sm text-white" style="background:#6366f1;">Apply</a>
                        <a th:href="@{/vacancies/edit/{id}(id=${v.idVacancy})}"
                           sec:authorize="hasAnyRole('ADMIN','RECRUITER')"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div th:if="${vacancies.totalPages > 1}" class="d-flex justify-content-center mt-4">
        <nav>
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${vacancies.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/vacancies(page=${vacancies.number - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, vacancies.totalPages - 1)}"
                    class="page-item" th:classappend="${i == vacancies.number ? 'active' : ''}">
                    <a class="page-link" th:href="@{/vacancies(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${vacancies.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/vacancies(page=${vacancies.number + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
