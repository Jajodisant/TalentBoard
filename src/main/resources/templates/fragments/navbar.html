<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head><title></title></head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background:#1a1a2e;">
    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold fs-5" th:href="@{/dashboard}">
            <i class="bi bi-briefcase-fill me-2" style="color:#6366f1;"></i>TalentBoard
        </a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link px-3" th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link px-3" th:href="@{/vacancies}">
                        <i class="bi bi-briefcase me-1"></i>Vacancies
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','RECRUITER')">
                    <a class="nav-link px-3" th:href="@{/vacancies/create}">
                        <i class="bi bi-plus-circle me-1"></i>Post Vacancy
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('CANDIDATE')">
                    <a class="nav-link px-3" th:href="@{/applications}">
                        <i class="bi bi-file-earmark-text me-1"></i>My Applications
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','RECRUITER')">
                    <a class="nav-link px-3" th:href="@{/interviews}">
                        <i class="bi bi-calendar-check me-1"></i>Interviews
                    </a>
                </li>

            </ul>

            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small">
                    <i class="bi bi-person-circle me-1"></i>
                    <span sec:authentication="name"></span>
                    <span class="badge ms-1 text-uppercase" style="background:#6366f1;font-size:0.65rem;"
                          sec:authentication="principal.authorities[0]"></span>
                </span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

</body>
</html>
