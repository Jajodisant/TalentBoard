<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TalentBoard – Register</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-layout">

<div class="login-wrapper">
    <div class="login-card">
        <h1 class="login-title">TalentBoard</h1>
        <p class="login-subtitle">Create your account</p>

        <div th:if="${errorMessage}" class="alert alert-error">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/register}" th:object="${registerForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Jane Doe" required autofocus/>
                <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" required/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Min. 8 characters" required/>
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" th:field="*{role}" required>
                    <option value="">Select a role...</option>
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
                <span class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <p class="login-footer">
            Already have an account? <a th:href="@{/login}">Sign In</a>
        </p>
    </div>
</div>

</body>
</html>
