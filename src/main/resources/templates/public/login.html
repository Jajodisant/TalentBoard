<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TalentBoard – Login</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-layout">

<div class="login-wrapper">
    <div class="login-card">
        <h1 class="login-title">TalentBoard</h1>
        <p class="login-subtitle">Sign in to your account</p>

        <!-- Error message -->
        <div th:if="${errorMessage}" class="alert alert-error">
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Logout message -->
        <div th:if="${logoutMessage}" class="alert alert-success">
            <span th:text="${logoutMessage}"></span>
        </div>

        <!-- Spring Security handles POST /login -->
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       placeholder="you@example.com" required autofocus/>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••" required/>
            </div>

            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <p class="login-footer">
            Don't have an account? <a th:href="@{/register}">Register</a>
        </p>
    </div>
</div>

</body>
</html>
